<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B7FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1456CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="240" height="240" rx="54" ry="54" fill="url(#bgGrad)" />

  <!-- 心电图波形：白色，居中，线宽 12px，圆角线帽 -->
  <polyline
    points="20,120 60,120 75,80 90,160 105,95 118,138 128,120 220,120"
    fill="none"
    stroke="white"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
