services:
  caddy:
    image: caddy:2-alpine
    container_name: apex_caddy
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_started

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: apex_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
      - ../backend/.env.production.local
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ../data:/data
      - ../backend/parquet:/app/parquet   # parquet 固定目录，容器内同路径
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: apex_mysql
    restart: unless-stopped
    env_file:
      - ../backend/.env.production
      - ../backend/.env.production.local
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apex_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

  nginx:
    image: nginx:alpine
    container_name: apex_nginx
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: apex_frontend_build:latest
    container_name: apex_frontend_build
    volumes:
      - frontend_dist:/output
    command: >
      sh -c "rm -rf /output/* && cp -r /usr/share/nginx/html/. /output/"

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
  redis_data:
  frontend_dist:
