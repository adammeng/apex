services:

  # ── 一次性初始化容器 ─────────────────────────────────────────────────────────
  # 职责：alembic 建表/迁移 + 首次 parquet 拉取（本地有文件则复制，否则从 OSS 下载）
  # restart: no 保证只跑一次；backend 等待它 healthy 才启动
  init:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: apex_init
    restart: "no"
    env_file: ../backend/.env
    volumes:
      - ../data:/data
      - ../backend/parquet:/parquet:ro   # 本地 parquet（有则优先复制，无则走 OSS）
    command: >
      sh -c "python -m scripts.init_data && echo 'INIT_DONE'"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -L /data/parquet_current || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60          # 最长等 5 分钟（OSS 下载较慢时）
      start_period: 10s

  # ── 后端 API ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: apex_backend
    restart: unless-stopped
    env_file: ../backend/.env
    volumes:
      - ../data:/data
    ports:
      - "8000:8000"
    depends_on:
      init:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: apex_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-apex}
      MYSQL_USER: ${MYSQL_USER:-apex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apex_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apex_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: apex_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
